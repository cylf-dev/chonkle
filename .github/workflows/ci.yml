name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Show files modified by pre-commit
        if: failure()
        run: git diff

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Cache core wasm fixture
        uses: actions/cache@v4
        with:
          path: tests/fixtures/chunks/cog_wasm/tiff-predictor-2-c.wasm
          key: core-wasm-tiff-predictor-2-c-v0.2.0

      - name: Cache component wasm fixture
        uses: actions/cache@v4
        with:
          path: tests/fixtures/chunks/cog_wasm/tiff-predictor-2-python.wasm
          key: component-wasm-tiff-predictor-2-python-v0.1.0

      - name: Run tests
        run: uv run pytest -v
